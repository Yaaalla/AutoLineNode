<!DOCTYPE html>
<html class="dark" lang="ar" dir="rtl">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>تسجيل الدخول | أوتو لاين</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d1ab66",
                        "background-dark": "#12100e",
                        "surface": "#1a1714"
                    },
                    fontFamily: {
                        "display": ["Cairo", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem"},
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #12100e; color: #ffffff; }
        .glass-panel {
            background-color: #1a1714;
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 1.5rem;
        }
        input {
            background-color: #12100e !important;
            border: 1px solid rgba(255,255,255,0.05) !important;
            color: #fff !important;
            border-radius: 1rem !important;
        }
        input:focus {
            border-color: #d1ab66 !important;
            outline: none !important;
            box-shadow: none !important;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
    </style>
</head>
<body class="antialiased h-screen flex items-center justify-center p-6 relative overflow-hidden">
    
    <!-- Background Decor -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>

    <div class="glass-panel w-full max-w-md p-10 relative z-10 shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold tracking-tight text-white mb-2">تسجيل الدخول</h1>
            <p class="text-sm text-slate-400">بوابة إدارة أوتو لاين للسيارات</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div id="error-msg" class="hidden bg-red-500/10 border border-red-500/20 text-red-500 text-sm font-bold p-4 rounded-xl text-center">
                بيانات الدخول غير صحيحة.
            </div>

            <div class="space-y-2 relative">
                <label class="text-[11px] font-bold text-slate-400 block px-2 text-right">اسم المستخدم</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-500">person</span>
                    <input type="text" name="username" required class="w-full py-4 pr-12 pl-4 text-sm font-sans text-right" placeholder="admin">
                </div>
            </div>

            <div class="space-y-2 relative">
                <label class="text-[11px] font-bold text-slate-400 block px-2 text-right">كلمة المرور</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-500">lock</span>
                    <input type="password" name="password" required class="w-full py-4 pr-12 pl-4 text-sm font-sans text-left" dir="ltr" placeholder="••••••••">
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full bg-primary hover:bg-primary/90 text-background-dark py-4 rounded-xl font-bold text-sm shadow-[0_0_20px_rgba(209,171,102,0.2)] transition-transform active:scale-95 flex items-center justify-center gap-2">
                    دخول المنصة <span class="material-symbols-outlined text-lg">login</span>
                </button>
            </div>
            
            <div class="text-center mt-6">
                <a href="index.html" class="text-xs text-slate-500 hover:text-white transition-colors underline">العودة للموقع الرئيسي</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await res.json();
                if (res.ok && result.success) {
                    // Update auth state in localStorage
                    localStorage.setItem('admin', JSON.stringify(result.user));
                    window.location.href = 'admin_dashboard.html';
                } else {
                    const errEl = document.getElementById('error-msg');
                    errEl.innerText = result.error || 'حدث خطأ في تسجيل الدخول.';
                    errEl.classList.remove('hidden');
                }
            } catch (error) {
                console.error(error);
            }
        });
    </script>
</body>
</html>
